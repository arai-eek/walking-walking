<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>arai-eek? walking walking!</title>
    <link rel="shortcut icon" type="image/x-icon" href="arai-icon.svg">
    <!-- Theme -->
    <meta name="theme-color" content="#2733A0">

    <!-- External Libs -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --blue: #2733A0;
            --red: #EE1B26;
            --white: #FFFFFF;
            --user-color: #2733A0;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #eee;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            z-index: 10;
            pointer-events: none;
        }

        .overlay * {
            pointer-events: auto;
        }

        /* Header & Lang Toggle */
        header {
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }

        .lang-switch {
            display: flex;
            gap: 5px;
        }

        .lang-btn {
            background: #f0f0f0;
            border: none;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
        }

        .lang-btn.active {
            background: var(--blue);
            color: white;
        }

        /* Setup Screen */
        .setup-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--blue);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .setup-card {
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        .setup-input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            margin-bottom: 12px;
            font-size: 1rem;
            text-align: center;
            font-weight: 600;
        }

        .setup-label {
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* GitHub Settings Sidebar */
        .github-sidebar {
            position: fixed;
            top: 0;
            left: -100%;
            width: 90%;
            max-width: 350px;
            height: 100%;
            background: white;
            z-index: 1100;
            transition: 0.4s;
            padding: 30px 20px;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.1);
        }

        .github-sidebar.open {
            left: 0;
        }

        /* Stats & Controls */
        .stats {
            top: 85px;
            left: 20px;
            background: var(--user-color);
            color: white;
            padding: 8px 15px;
            border-radius: 12px;
            display: flex;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        .controls {
            bottom: 30px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-fab {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        .btn-main {
            width: 75px;
            height: 75px;
            background: var(--blue);
            color: white;
        }

        .btn-white {
            background: white;
            color: #333;
        }

        .btn-red {
            background: var(--red);
            color: white;
        }

        .tracking-active {
            animation: pulse 2s infinite;
            background: var(--red);
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(238, 27, 38, 0.4);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(238, 27, 38, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(238, 27, 38, 0);
            }
        }

        /* UI Helpers */
        .hidden {
            display: none !important;
        }

        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
        }

        .color-dot.active {
            transform: scale(1.3);
            outline: 2px solid white;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 90%;
            max-width: 400px;
            height: 100%;
            background: white;
            z-index: 1100;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            right: 0;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.open {
            display: flex;
        }

        .modal-body {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 25px;
            border-radius: 25px;
        }
    </style>
</head>

<body>

    <!-- Language Selector -->
    <div class="lang-selector overlay" style="top: 20px; right: 20px; z-index: 20;"></div>

    <!-- Login/Setup Screen -->
    <div id="setup-screen" class="setup-screen hidden">
        <div class="setup-card">
            <img src="arai-icon.svg"
                style="width:100px; margin-bottom:15px;">
            <h1 style="margin-bottom:10px;">arai-eek? walking-walking</h1>
            <p id="t-setup-desc" style="opacity:0.8; margin-bottom:20px;">Register your cnx adventure profile. Name and simple whatever password.</p>

            <input type="text" id="setup-name" class="setup-input" placeholder="Name">
            <input type="password" id="setup-pass" class="setup-input" placeholder="Password">

            <p class="setup-label" id="t-pick-color">Choose Your Color</p>
            <div style="display:flex; justify-content:center; gap:10px; margin-bottom:25px;" id="setup-colors">
                <div class="color-dot active" style="background:#2733A0" data-color="#2733A0"></div>
                <div class="color-dot" style="background:#EE1B26" data-color="#EE1B26"></div>
                <div class="color-dot" style="background:#2ecc71" data-color="#2ecc71"></div>
                <div class="color-dot" style="background:#9b59b6" data-color="#9b59b6"></div>
            </div>

            <button class="btn-setup" onclick="completeSetup()"
                style="background:var(--red); color:white; border:none; padding:15px; border-radius:12px; width:100%; font-weight:800; cursor:pointer;"
                id="t-btn-start">START JOURNEY</button>
        </div>
    </div>

    <!-- GitHub Settings Sidebar -->
    <div id="github-sidebar" class="github-sidebar">
        <h2 id="t-gh-settings">GitHub Sync Settings</h2>
        <p style="font-size:0.8rem; color:#666; margin-bottom:20px;">Connect to GitHub Pages repo to sync data.</p>

        <label class="setup-label" style="color:#333;">Personal Access Token</label>
        <input type="password" id="gh-token" class="setup-input" style="border:1px solid #ddd;" placeholder="ghp_xxxx">

        <label class="setup-label" style="color:#333;">Repo Name (User/Repo)</label>
        <input type="text" id="gh-repo" class="setup-input" style="border:1px solid #ddd;"
            placeholder="username/my-walking-app">

        <button onclick="saveGitHubSettings()" class="btn-setup"
            style="background:var(--blue); color:white; border:none; padding:12px; border-radius:10px; width:100%; font-weight:700;">SAVE
            SETTINGS</button>
        <button onclick="toggleGitHub(false)"
            style="margin-top:10px; background:none; border:none; color:#999; cursor:pointer; width:100%;">Close</button>
    </div>

    <div id="map"></div>

    <!-- UI Overlays -->
    <header class="overlay">
        <div style="display:flex; align-items:center; gap:10px;">
            <div id="u-avatar"
                style="width:32px; height:32px; border-radius:50%; background:var(--blue); color:white; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.8rem; border:2px solid white;">
                A</div>
            <div id="u-name" style="font-weight:600; font-size:0.85rem; color:#333;">Explorer</div>
        </div>
        <div class="lang-switch">
            <button class="lang-btn active" onclick="setLang('en')">EN</button>
            <button class="lang-btn" onclick="setLang('th')">TH</button>
        </div>
        <button onclick="toggleSidebar(true)" class="btn-fab btn-white"
            style="width:38px; height:38px; box-shadow:none; background:#f5f5f5;">
            <i data-lucide="image" style="width:18px;"></i>
        </button>
    </header>

    <div class="stats overlay">
        <div style="display:flex; flex-direction:column;">
            <span class="setup-label" style="font-size:0.6rem; margin:0;" id="t-dist-label">Distance</span>
            <span id="dist-txt" style="font-weight:800; font-size:0.9rem;">0.00 km</span>
        </div>
        <div style="display:flex; flex-direction:column;">
            <span class="setup-label" style="font-size:0.6rem; margin:0;" id="t-memo-label">Memories</span>
            <span id="memo-txt" style="font-weight:800; font-size:0.9rem;">0</span>
        </div>
    </div>

    <div class="controls overlay">
        <button id="btn-track" onclick="toggleTracking()" class="btn-fab btn-main">
            <i data-lucide="play"></i>
        </button>
        <button id="btn-add" onclick="openModal()" class="btn-fab btn-white" disabled>
            <i data-lucide="camera" style="color:var(--red)"></i>
        </button>
        <button onclick="toggleGitHub(true)" class="btn-fab btn-white">
            <i data-lucide="settings"></i>
        </button>
        <button onclick="locate(true)" class="btn-fab btn-white">
            <i data-lucide="crosshair"></i>
        </button>
    </div>

    <!-- Gallery Sidebar -->
    <div id="sidebar" class="sidebar">
        <div
            style="padding:25px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
            <h2 id="t-journal">Journal</h2>
            <div style="display:flex; gap:10px;">
                <button onclick="fetchGlobalData()" class="btn-fab btn-white" style="width:35px; height:35px; box-shadow:none; background:#f0f0f0;" title="Refresh">
                    <i data-lucide="refresh-cw" style="width:18px;"></i>
                </button>
                <button onclick="playback()" class="btn-fab btn-white" style="width:35px; height:35px; box-shadow:none; background:#f0f0f0;" title="Replay">
                    <i data-lucide="play-circle" style="width:18px;"></i>
                </button>
                <button onclick="toggleSidebar(false)"
                    style="background:none; border:none; font-size:1.5rem;">&times;</button>
            </div>
        </div>
        <div id="gallery"
            style="flex:1; overflow-y:auto; padding:15px; display:grid; grid-template-columns:1fr 1fr; gap:12px;"></div>
    </div>

    <!-- Memory Modal -->
    <div id="modal" class="modal">
        <div class="modal-body">
            <h3 id="t-capture-title" style="margin-bottom:15px; color:var(--blue)">Capture Moment</h3>
            <div style="width:100%; aspect-ratio:4/3; background:#f5f5f5; border:2px dashed #ccc; border-radius:15px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; overflow:hidden;"
                onclick="document.getElementById('inp-file').click()">
                <input type="file" id="inp-file" accept="image/*" capture="environment" hidden
                    onchange="previewImage(this)">
                <div id="cam-placeholder">
                    <i data-lucide="camera" style="width:30px; color:#999;"></i>
                    <p style="color:#999; font-size:0.7rem; margin-top:5px;" id="t-tap-photo">Tap to take photo</p>
                </div>
                <img id="preview-img" src="" class="hidden" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <textarea id="inp-note" placeholder="..."
                style="width:100%; height:80px; margin-top:12px; padding:12px; border-radius:10px; border:1px solid #ddd; resize:none;"></textarea>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button onclick="closeModal()"
                    style="flex:1; padding:12px; border:none; border-radius:10px; background:#eee;"
                    id="t-btn-cancel">Cancel</button>
                <button onclick="saveMemory()"
                    style="flex:2; padding:12px; border:none; border-radius:10px; background:var(--blue); color:white; font-weight:700;"
                    id="t-btn-save">Save</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- CONFIGURATION (HARDCODE HERE FOR SHARED TOKEN) ---
        const CONFIG = {
            ghToken: '', // Masukkan Token Anda di sini (Contoh: 'ghp_xxxx')
            ghRepo: ''   // Masukkan Repo Anda di sini (Contoh: 'username/repo')
        };

        const TRANSLATIONS = {
            en: {
                setupDesc: "Register your adventure profile.", pickColor: "Choose Your Color", btnStart: "START JOURNEY",
                distLabel: "Distance", memoLabel: "Memories", journal: "Journal", captureTitle: "Capture Moment",
                tapPhoto: "Tap to take photo", btnCancel: "Cancel", btnSave: "Save", ghSettings: "GitHub Settings",
                alertLogin: "Please enter name and password!", alertPhoto: "Please take a photo!"
            },
            th: {
                setupDesc: "ลงทะเบียนโปรไฟล์การผจญภัยของคุณ", pickColor: "เลือกสีของคุณ", btnStart: "เริ่มการเดินทาง",
                distLabel: "ระยะทาง", memoLabel: "ความทรงจำ", journal: "บันทึกการเดินทาง", captureTitle: "บันทึกช่วงเวลา",
                tapPhoto: "แตะเพื่อถ่ายภาพ", btnCancel: "ยกเลิก", btnSave: "บันทึก", ghSettings: "ตั้งค่า GitHub",
                alertLogin: "กรุณาใส่ชื่อและรหัสผ่าน!", alertPhoto: "กรุณาถ่ายรูป!"
            }
        };

        let map, userMarker, pathLine, db, currentLang = 'en';
        let isTracking = false, pathPoints = [], memories = [], watchId = null, isPlayingBack = false;
        let currentUser = { name: '', color: '#2733A0', pass: '', ghToken: '', ghRepo: '' };
        
        // Social Data
        let globalUsers = [];
        let globalMemories = [];
        let globalPaths = {}; // { username: [points] }
        let userPathsLayers = {}; // { username: L.Polyline }

        window.onload = async () => {
            lucide.createIcons();
            initMap();
            await initDB();
            checkUser();
            setupColorPicker();
        };

        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === lang));
            const t = TRANSLATIONS[lang];
            document.getElementById('t-setup-desc').innerText = t.setupDesc;
            document.getElementById('t-pick-color').innerText = t.pickColor;
            document.getElementById('t-btn-start').innerText = t.btnStart;
            document.getElementById('t-dist-label').innerText = t.distLabel;
            document.getElementById('t-memo-label').innerText = t.memoLabel;
            document.getElementById('t-journal').innerText = t.journal;
            document.getElementById('t-capture-title').innerText = t.captureTitle;
            document.getElementById('t-tap-photo').innerText = t.tapPhoto;
            document.getElementById('t-btn-cancel').innerText = t.btnCancel;
            document.getElementById('t-btn-save').innerText = t.btnSave;
            document.getElementById('t-gh-settings').innerText = t.ghSettings;
            document.getElementById('setup-name').placeholder = lang === 'en' ? 'Name' : 'ชื่อ';
            document.getElementById('setup-pass').placeholder = lang === 'en' ? 'Password' : 'รหัสผ่าน';
        }

        function checkUser() {
            const saved = localStorage.getItem('arai_user_secure');
            if (saved) {
                currentUser = JSON.parse(saved);
                
                // Override with CONFIG if provided
                if (CONFIG.ghToken) currentUser.ghToken = CONFIG.ghToken;
                if (CONFIG.ghRepo) currentUser.ghRepo = CONFIG.ghRepo;
                
                applyUserStyle();
                loadFromDB();
                if (currentUser.ghToken && currentUser.ghRepo) fetchGlobalData();
            } else {
                document.getElementById('setup-screen').classList.remove('hidden');
            }
        }

        function setupColorPicker() {
            document.querySelectorAll('.color-dot').forEach(dot => {
                dot.onclick = () => {
                    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                    dot.classList.add('active');
                    currentUser.color = dot.dataset.color;
                };
            });
        }

        async function completeSetup() {
            const name = document.getElementById('setup-name').value.trim();
            const pass = document.getElementById('setup-pass').value.trim();
            if (!name || !pass) return alert(TRANSLATIONS[currentLang].alertLogin);

            currentUser.name = name;
            currentUser.pass = pass;
            
            // Use CONFIG if provided
            if (CONFIG.ghToken) currentUser.ghToken = CONFIG.ghToken;
            if (CONFIG.ghRepo) currentUser.ghRepo = CONFIG.ghRepo;

            localStorage.setItem('arai_user_secure', JSON.stringify(currentUser));
            document.getElementById('setup-screen').classList.add('hidden');
            applyUserStyle();
            
            // If user already has GitHub settings, fetch data
            if (currentUser.ghToken && currentUser.ghRepo) fetchGlobalData();
        }

        function applyUserStyle() {
            document.documentElement.style.setProperty('--user-color', currentUser.color);
            document.getElementById('u-name').innerText = currentUser.name;
            document.getElementById('u-avatar').innerText = currentUser.name.charAt(0).toUpperCase();
            document.getElementById('u-avatar').style.background = currentUser.color;
            if (userMarker) userMarker.setIcon(L.divIcon({ className: 'u-m', html: `<div style="background:${currentUser.color}; width:20px; height:20px; border-radius:50%; border:3px solid white;"></div>`, iconSize: [20, 20] }));
        }

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0, 0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            userMarker = L.marker([0, 0], { icon: L.divIcon({ className: 'u-m', html: `<div style="background:${currentUser.color}; width:20px; height:20px; border-radius:50%; border:3px solid white;"></div>`, iconSize: [20, 20] }) }).addTo(map);
            pathLine = L.polyline([], { color: currentUser.color, weight: 6, opacity: 0.8 }).addTo(map);
            locate(true);
        }

        function locate(center = false) {
            navigator.geolocation.getCurrentPosition(p => {
                const pos = [p.coords.latitude, p.coords.longitude];
                userMarker.setLatLng(pos);
                if (center) map.flyTo(pos, 16);
            }, null, { enableHighAccuracy: true });
        }

        function toggleTracking() {
            isTracking = !isTracking;
            const btn = document.getElementById('btn-track');
            if (isTracking) {
                btn.classList.add('tracking-active'); btn.innerHTML = '<i data-lucide="square"></i>';
                document.getElementById('btn-add').disabled = false;
                watchId = navigator.geolocation.watchPosition(updatePath, null, { enableHighAccuracy: true });
            } else {
                btn.classList.remove('tracking-active'); btn.innerHTML = '<i data-lucide="play"></i>';
                document.getElementById('btn-add').disabled = true;
                if (watchId) navigator.geolocation.clearWatch(watchId);
                // Sync path to GitHub on stop
                if (currentUser.ghToken && currentUser.ghRepo) syncPathToGitHub();
            }
            lucide.createIcons();
        }

        function updatePath(p) {
            const pos = [p.coords.latitude, p.coords.longitude];
            userMarker.setLatLng(pos); pathPoints.push(pos); pathLine.setLatLngs(pathPoints);
            let dist = 0;
            for (let i = 1; i < pathPoints.length; i++) dist += L.latLng(pathPoints[i - 1]).distanceTo(L.latLng(pathPoints[i]));
            document.getElementById('dist-txt').innerText = (dist / 1000).toFixed(2) + ' km';
        }

        async function saveMemory() {
            const note = document.getElementById('inp-note').value;
            const img = document.getElementById('preview-img').src;
            if (!img || img === '') return alert(TRANSLATIONS[currentLang].alertPhoto);

            const pos = userMarker.getLatLng();
            const memo = { 
                id: Date.now(), 
                user: currentUser.name, 
                color: currentUser.color, 
                lat: pos.lat, 
                lng: pos.lng, 
                note, 
                img, 
                time: new Date().toLocaleString(),
                likes: 0,
                comments: []
            };

            const tx = db.transaction('memos', 'readwrite');
            tx.objectStore('memos').add(memo);

            addPin(memo); memories.push(memo); updateGallery(); closeModal();
            document.getElementById('memo-txt').innerText = memories.length;

            // GitHub Sync
            if (currentUser.ghToken && currentUser.ghRepo) syncMemoryToGitHub(memo);
        }

        // --- GitHub Multi-User Sync ---

        async function fetchGitHub(path) {
            const url = `https://api.github.com/repos/${currentUser.ghRepo}/contents/${path}`;
            const res = await fetch(url, { headers: { 'Authorization': `token ${currentUser.ghToken}` } });
            if (!res.ok) return null;
            const data = await res.json();
            return JSON.parse(atob(data.content));
        }

        async function pushGitHub(path, content, message) {
            const url = `https://api.github.com/repos/${currentUser.ghRepo}/contents/${path}`;
            const existing = await fetch(`https://api.github.com/repos/${currentUser.ghRepo}/contents/${path}`, {
                headers: { 'Authorization': `token ${currentUser.ghToken}` }
            }).then(r => r.json()).catch(() => null);

            const body = {
                message,
                content: btoa(typeof content === 'string' ? content : JSON.stringify(content)),
                sha: existing?.sha
            };

            return fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${currentUser.ghToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
        }

        async function fetchGlobalData() {
            console.log('Fetching global data...');
            // 1. Fetch Users Index
            const users = await fetchGitHub('shared/index.json') || [];
            globalUsers = users;

            // Ensure current user is in index
            if (!globalUsers.find(u => u.name === currentUser.name)) {
                globalUsers.push({ name: currentUser.name, color: currentUser.color });
                await pushGitHub('shared/index.json', globalUsers, `Add user ${currentUser.name}`);
            }

            // 2. Fetch all user paths
            for (const u of globalUsers) {
                if (u.name === currentUser.name) continue; // Skip self for now
                const pathData = await fetchGitHub(`users/${u.name}/path.json`);
                if (pathData) {
                    globalPaths[u.name] = pathData;
                    drawOtherPath(u.name, pathData, u.color);
                }
                
                // 3. Fetch memories
                const userMemos = await fetchGitHub(`users/${u.name}/memories.json`);
                if (userMemos) {
                    userMemos.forEach(m => {
                        if (!memories.find(local => local.id === m.id)) {
                            addPin(m);
                            globalMemories.push(m);
                        }
                    });
                }
            }
            updateGallery();
        }

        function drawOtherPath(username, points, color) {
            if (userPathsLayers[username]) map.removeLayer(userPathsLayers[username]);
            userPathsLayers[username] = L.polyline(points, { color, weight: 4, opacity: 0.5, dashArray: '5, 10' }).addTo(map);
        }

        async function syncPathToGitHub() {
            await pushGitHub(`users/${currentUser.name}/path.json`, pathPoints, `Update path for ${currentUser.name}`);
        }

        async function syncMemoryToGitHub(memo) {
            // 1. Upload Photo
            const base64Data = memo.img.split(',')[1];
            await pushGitHub(`users/${currentUser.name}/photos/${memo.id}.jpg`, base64Data, `Upload photo ${memo.id}`);

            // 2. Update user memories list
            const userMemos = await fetchGitHub(`users/${currentUser.name}/memories.json`) || [];
            userMemos.push(memo);
            await pushGitHub(`users/${currentUser.name}/memories.json`, userMemos, `Add memory ${memo.id}`);
        }

        async function addLike(memoId, userName) {
            // Find memo (either in local or global)
            let targetMemo = memories.find(m => m.id === memoId) || globalMemories.find(m => m.id === memoId);
            if (!targetMemo) return;

            // Update on GitHub
            const userMemos = await fetchGitHub(`users/${targetMemo.user}/memories.json`);
            const memoIndex = userMemos.findIndex(m => m.id === memoId);
            if (memoIndex > -1) {
                userMemos[memoIndex].likes = (userMemos[memoIndex].likes || 0) + 1;
                await pushGitHub(`users/${targetMemo.user}/memories.json`, userMemos, `Like memory ${memoId}`);
                alert('Liked!');
                fetchGlobalData(); // Refresh
            }
        }

        async function addComment(memoId) {
            const txt = prompt('Add a comment:');
            if (!txt) return;

            let targetMemo = memories.find(m => m.id === memoId) || globalMemories.find(m => m.id === memoId);
            if (!targetMemo) return;

            const userMemos = await fetchGitHub(`users/${targetMemo.user}/memories.json`);
            const memoIndex = userMemos.findIndex(m => m.id === memoId);
            if (memoIndex > -1) {
                userMemos[memoIndex].comments = userMemos[memoIndex].comments || [];
                userMemos[memoIndex].comments.push({ user: currentUser.name, text: txt, time: new Date().toLocaleTimeString() });
                await pushGitHub(`users/${targetMemo.user}/memories.json`, userMemos, `Comment on memory ${memoId}`);
                alert('Commented!');
                fetchGlobalData(); // Refresh
            }
        }

        // --- Standard Helpers ---
        async function initDB() { return new Promise(res => { const req = indexedDB.open('AraiSecureDB', 1); req.onupgradeneeded = e => e.target.result.createObjectStore('memos', { keyPath: 'id' }); req.onsuccess = e => { db = e.target.result; res(); }; }); }
        function loadFromDB() { if (!db) return; db.transaction('memos', 'readonly').objectStore('memos').getAll().onsuccess = e => { memories = e.target.result; memories.forEach(addPin); updateGallery(); document.getElementById('memo-txt').innerText = memories.length; }; }
        
        function addPin(m) { 
            const pin = L.marker([m.lat, m.lng], { 
                icon: L.divIcon({ className: 'p-m', html: `<div style="background:${m.color}; width:14px; height:14px; border-radius:50%; border:2px solid white;"></div>`, iconSize: [14, 14] }) 
            }).addTo(map);
            
            const commentsHtml = (m.comments || []).map(c => `<div style="font-size:10px; border-bottom:1px solid #eee; padding:2px 0;"><b>${c.user}:</b> ${c.text}</div>`).join('');
            
            pin.bindPopup(`
                <div style="width:180px">
                    <img src="${m.img}" style="width:100%; border-radius:10px">
                    <p style="font-size:12px; margin-top:5px;"><b>${m.user}:</b> ${m.note}</p>
                    <div style="display:flex; gap:10px; margin-top:5px; border-top:1px solid #eee; padding-top:5px;">
                        <button onclick="addLike(${m.id}, '${m.user}')" style="background:none; border:none; color:red; cursor:pointer;"><i data-lucide="heart" style="width:14px"></i> ${m.likes || 0}</button>
                        <button onclick="addComment(${m.id})" style="background:none; border:none; color:blue; cursor:pointer;"><i data-lucide="message-square" style="width:14px"></i></button>
                        <button onclick="playbackSocial('${m.user}')" style="background:none; border:none; color:green; cursor:pointer;"><i data-lucide="play" style="width:14px"></i></button>
                    </div>
                    <div style="max-height:60px; overflow-y:auto; margin-top:5px;">${commentsHtml}</div>
                </div>
            `);
            pin.on('popupopen', () => lucide.createIcons());
        }

        function updateGallery() { 
            const c = document.getElementById('gallery'); 
            const allMemos = [...memories, ...globalMemories].sort((a,b) => b.id - a.id);
            if (allMemos.length === 0) return; 
            c.innerHTML = ''; 
            allMemos.forEach(m => { 
                const el = document.createElement('div'); 
                el.className = 'gallery-item';
                el.style.background = '#fff'; el.style.borderRadius = '12px'; el.style.overflow = 'hidden'; el.style.boxShadow = '0 2px 5px rgba(0,0,0,0.1)';
                el.innerHTML = `<img src="${m.img}" style="width:100%; height:80px; object-fit:cover;"><div style="padding:8px;"><p style="font-size:0.6rem; font-weight:700; color:${m.color}">${m.user}</p><p style="font-size:0.6rem; color:#555; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${m.note}</p></div>`; 
                el.onclick = () => { map.flyTo([m.lat, m.lng], 18); toggleSidebar(false); }; 
                c.appendChild(el); 
            }); 
        }

        function toggleSidebar(s) { document.getElementById('sidebar').classList.toggle('open', s); }
        function openModal() { document.getElementById('modal').classList.add('open'); }
        function closeModal() { document.getElementById('modal').classList.remove('open'); document.getElementById('preview-img').src = ''; document.getElementById('preview-img').classList.add('hidden'); document.getElementById('cam-placeholder').classList.remove('hidden'); document.getElementById('inp-note').value = ''; }
        function previewImage(inp) { const file = inp.files[0]; if (file) { const r = new FileReader(); r.onload = e => { const i = document.getElementById('preview-img'); i.src = e.target.result; i.classList.remove('hidden'); document.getElementById('cam-placeholder').classList.add('hidden'); }; r.readAsDataURL(file); } }

        function playbackSocial(username) {
            const points = (username === currentUser.name) ? pathPoints : globalPaths[username];
            const userMemos = (username === currentUser.name) ? memories : globalMemories.filter(m => m.user === username);
            if (!points || points.length < 2) return alert('No path data found for this user!');
            startPlayback(points, userMemos);
        }

        async function playback() {
            if (pathPoints.length < 2) return alert(currentLang === 'en' ? 'No journey recorded!' : 'ไม่มีบันทึกการเดินทาง!');
            startPlayback(pathPoints, memories);
        }

        async function startPlayback(points, userMemos) {
            if (isPlayingBack) return;
            isPlayingBack = true;
            toggleSidebar(false);
            pathLine.setLatLngs([]);
            map.closePopup();

            // Collect all markers for this playback
            const markers = [];
            map.eachLayer(l => { if(l instanceof L.Marker && l !== userMarker) markers.push(l); });

            for (let i = 0; i < points.length; i++) {
                if (!isPlayingBack) break;
                const p = points[i];
                pathLine.addLatLng(p);
                userMarker.setLatLng(p);
                map.panTo(p);

                userMemos.forEach(m => {
                    const dist = L.latLng(p).distanceTo(L.latLng(m.lat, m.lng));
                    if (dist < 20) { 
                        markers.forEach(marker => {
                            if (marker.getLatLng().lat === m.lat && marker.getLatLng().lng === m.lng) marker.openPopup();
                        });
                    }
                });
                await new Promise(r => setTimeout(r, 100));
            }
            isPlayingBack = false;
        }
        function toggleGitHub(show) { document.getElementById('github-sidebar').classList.toggle('open', show); }
        function saveGitHubSettings() {
            currentUser.ghToken = document.getElementById('gh-token').value;
            currentUser.ghRepo = document.getElementById('gh-repo').value;
            localStorage.setItem('arai_user_secure', JSON.stringify(currentUser));
            alert('Settings Saved!');
            toggleGitHub(false);
            if (currentUser.ghToken && currentUser.ghRepo) fetchGlobalData();
        }

    </script>
